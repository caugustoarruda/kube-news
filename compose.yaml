services: # lista de servicos containers
  # nginx: # nome do serviço/container
  #   container_name: nginx # nome do container
  #   image: nginx:latest # qual imagem sera utilizada, se for uma criada local, usar o nome dela
  #   ports: # bind de porta -p 8080:80
  #     - "8081:80"
  #   # command: "hello world"
  postgre:
    image: postgres:12.17
    ports:
      - 5434:5432
    environment:
      - POSTGRES_DB=kubenews
      - POSTGRES_USER=kubenews
      - POSTGRES_PASSWORD=pg123
    volumes:
      - postgre_docker_vol:/var/lib/postgresql/data
    networks:
      - kube_news_net

  kube_news:
    image: caugustogarruda/kube-news:v1
    ports:
      - 8080:8080
    networks:
      - kube_news_net
    environment:
      - DB_DATABASE=kubenews
      - DB_USERNAME=kubenews
      - DB_PASSWORD=pg123
      - DB_HOST=postgre
    

volumes:
  postgre_docker_vol:

networks:
  kube_news_net:
    driver: bridge